<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dictionary</title>
</head>
<body>
    <div class=" container">
        <h1>Wordly Dictionary</h1>
        <form id="searchForm">
            <input 
            type="text"
            id="wordInput"
            placeholder="Search a word..."
            aria-label="Search Word">
            <button type="submit">Search</button>
        </form>
    </div>
    
</body>
</html>
