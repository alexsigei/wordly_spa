<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dictionary</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class=" container">
        <h1>Wordly Dictionary</h1>
        <form id="searchForm">
            <input 
            type="text"
            id="wordInput"
            placeholder="Search a word..."
            aria-label="Search Word">
            <button type="submit">Search</button>
        </form>

        <p id="error"></p>

        <div id="results">

            <h2 id="word"></h2>

            <p id="phonetic"></p>

            <p id="partSpeech"></p>

            <p id="definition"></p>

            <p id="example"></p>

            <p id="synonyms"></p>

            <button id="audioBtn">Play Pronunciation</button>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
